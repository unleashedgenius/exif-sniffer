services:
  exifsniffer:
    build: .
    image: exifsniffer
    ports:
      - "3000:3000"
    volumes:
      - exifsniffer_data:/data
      # Optional: mount a host folder and pass its in-container path as local_media_root in tool calls.
      # - /path/on/host/photos:/media:rw
    environment:
      DATA_DIR: /data
      HOST: "0.0.0.0"
      PORT: "3000"
      MAX_DOWNLOAD_BYTES: "100000000"

volumes:
  exifsniffer_data:
