services:
  exifsniffer:
    build: .
    image: exifsniffer:local
    ports:
      - "3000:3000"
    volumes:
      - exifsniffer_data:/data
    environment:
      DATA_DIR: /data
      HOST: "0.0.0.0"
      PORT: "3000"
      MAX_DOWNLOAD_BYTES: "100000000"

volumes:
  exifsniffer_data:
